name: CI Pipeline

on:
  push:
    branches: [ "*" ]
  pull_request:

jobs:

  bandit_scan:
    name: Bandit SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r . -f sarif -o bandit.sarif -lll || true

      - name: Upload SARIF (Bandit)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif

  semgrep_scan:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest

    container:
      image: returntocorp/semgrep:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan --severity=ERROR --severity=WARNING --sarif --output=semgrep.sarif || true

      - name: Upload SARIF (Semgrep)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  docker_build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [bandit_scan, semgrep_scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pygoat-app .
